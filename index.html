<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>企微工作台 - 门店会员营销Demo</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}
.phone-frame{width:390px;height:844px;background:#F5F6FA;border-radius:48px;border:12px solid #1a1a1a;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.phone-screen{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative}
.phone-screen::-webkit-scrollbar{display:none}

/* Status bar */
.status-bar{height:44px;background:#1C2B4A;display:flex;align-items:center;justify-content:space-between;padding:0 20px;color:#fff;font-size:12px;flex-shrink:0}
.status-bar .icons{font-size:11px;letter-spacing:2px}

/* Header */
.qy-header{background:linear-gradient(180deg,#1C2B4A 0%,#243556 100%);padding:8px 16px 16px;flex-shrink:0}
.qy-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:10px}
.qy-search{display:flex;align-items:center;background:rgba(255,255,255,.12);border-radius:8px;height:36px;padding:0 12px;gap:8px}
.qy-search .icon{color:rgba(255,255,255,.5);font-size:14px}
.qy-search .placeholder{color:rgba(255,255,255,.4);font-size:14px}

/* Service summary */
.service-card{margin:12px 12px 0;background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.service-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.service-title{display:flex;align-items:center;gap:6px}
.service-title .dot{width:8px;height:8px;border-radius:50%;background:#52C41A}
.service-title span{font-size:15px;font-weight:600;color:#333}
.service-link{font-size:12px;color:#2563EB;cursor:pointer}
.service-body{font-size:13px;color:#999;line-height:1.5}
.service-body b{color:#666;font-weight:500}
.service-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 12px;background:rgba(37,99,235,.08);border-radius:4px;font-size:12px;color:#2563EB;cursor:pointer;border:none}

/* Section card */
.section-card{margin:12px 12px 0;background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:16px;font-weight:600;color:#333}
.section-more{font-size:12px;color:#999;cursor:pointer}

/* Icon grid */
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 8px}
.icon-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;position:relative}
.icon-item:active{opacity:.7}
.icon-box{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative}
.icon-label{font-size:11px;color:#666;text-align:center;line-height:1.2;max-width:68px;word-break:keep-all}
.icon-badge{position:absolute;top:-2px;right:-2px;min-width:14px;height:14px;padding:0 3px;border-radius:7px;background:#FF4D4F;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600}
.icon-sub{font-size:9px;color:#999;margin-top:-4px}

/* Sales section */
.sales-grid{display:flex;gap:20px;padding:4px 0}
.sales-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.sales-item:active{opacity:.7}
.sales-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.sales-label{font-size:11px;color:#666}

/* Tab bar */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:82px;background:#fff;border-top:1px solid #E8E8E8;display:flex;align-items:flex-start;padding-top:8px;z-index:10}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative}
.tab-icon{font-size:22px;color:#999;height:24px;display:flex;align-items:center;justify-content:center}
.tab-item.active .tab-icon{color:#2563EB}
.tab-label{font-size:10px;color:#999}
.tab-item.active .tab-label{color:#2563EB;font-weight:500}
.tab-dot{position:absolute;top:-2px;right:50%;margin-right:-18px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#FF4D4F;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600}

/* Toast */
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:300;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
<div class="phone-frame">
  <div class="phone-screen" ref="screenRef">

    <!-- Status bar -->
    <div class="status-bar">
      <span>13:56</span>
      <span class="icons">5G &#128267; &#128268;</span>
    </div>

    <!-- Header -->
    <div class="qy-header">
      <div class="qy-title">工作台</div>
      <div class="qy-search" @click="toast('搜索仅演示')">
        <span class="icon">&#128269;</span>
        <span class="placeholder">搜索应用、功能、文档</span>
      </div>
    </div>

    <!-- Service summary -->
    <div class="service-card">
      <div class="service-head">
        <div class="service-title"><div class="dot"></div><span>服务总结</span></div>
        <span class="service-link">查看全部 ›</span>
      </div>
      <div class="service-body">
        <b>AI自动结案</b>：今日已完成 <b>3</b> 个服务工单结案，效率提升 <b>42%</b>
      </div>
      <button class="service-btn" @click="toast('观看讲解仅演示')">&#9654; 观看讲解</button>
    </div>

    <!-- 融合零售助手 -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">融合零售助手</span>
        <span class="section-more" @click="toast('更多应用仅演示')">更多 ›</span>
      </div>
      <div class="icon-grid">
        <div class="icon-item" v-for="item in apps" :key="item.label" @click="onAppClick(item)">
          <div class="icon-box" :style="{background:item.bg}">
            <span v-html="item.icon"></span>
            <div class="icon-badge" v-if="item.badge">{{item.badge}}</div>
          </div>
          <div class="icon-label">{{item.label}}</div>
          <div class="icon-sub" v-if="item.sub">{{item.sub}}</div>
        </div>
      </div>
    </div>

    <!-- 销售通 -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">销售通</span>
        <span class="section-more" @click="toast('更多仅演示')">更多 ›</span>
      </div>
      <div class="sales-grid">
        <div class="sales-item" v-for="item in salesApps" :key="item.label" @click="onAppClick(item)">
          <div class="sales-icon" :style="{background:item.bg}"><span v-html="item.icon"></span></div>
          <div class="sales-label">{{item.label}}</div>
        </div>
      </div>
    </div>

    <!-- Spacer for tabbar -->
    <div style="height:90px"></div>
  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab-item" @click="toast('消息仅演示')">
      <div class="tab-icon">&#128172;</div>
      <div class="tab-label">消息</div>
      <div class="tab-dot">19</div>
    </div>
    <div class="tab-item" @click="toast('文档仅演示')">
      <div class="tab-icon">&#128196;</div>
      <div class="tab-label">文档</div>
    </div>
    <div class="tab-item" @click="toast('通讯录仅演示')">
      <div class="tab-icon">&#128101;</div>
      <div class="tab-label">通讯录</div>
    </div>
    <div class="tab-item active">
      <div class="tab-icon">&#9638;</div>
      <div class="tab-label">工作台</div>
    </div>
    <div class="tab-item" @click="toast('我仅演示')">
      <div class="tab-icon">&#128100;</div>
      <div class="tab-label">我</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" v-if="toastMsg">{{toastMsg}}</div>
</div>
</div>

<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    const screenRef = ref(null);
    const toastMsg = ref('');
    let toastTimer = null;

    function toast(msg) {
      toastMsg.value = msg;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastMsg.value = ''; }, 1500);
    }

    const apps = ref([
      { label:'账号管理', bg:'linear-gradient(135deg,#4FACFE,#00C6FB)', icon:'&#128100;', badge:'' },
      { label:'服务工作台', bg:'linear-gradient(135deg,#FF9800,#FF7043)', icon:'&#128194;', badge:'' },
      { label:'超级导购', bg:'linear-gradient(135deg,#FF6B6B,#EE5A24)', icon:'&#128129;', badge:'' },
      { label:'智慧零售商户助手', bg:'linear-gradient(135deg,#A8E6CF,#3DC1D3)', icon:'&#127970;', badge:'' },
      { label:'门店会员营销', bg:'linear-gradient(135deg,#FF6348,#FF4757)', icon:'&#127873;', badge:'', target:'index.html' },
      { label:'联想乐呗', bg:'linear-gradient(135deg,#DFE6E9,#B2BEC3)', icon:'&#127925;', sub:'暂无注册信息', badge:'' },
      { label:'联想会员中心', bg:'linear-gradient(135deg,#E74C3C,#C0392B)', icon:'<b style="color:#fff;font-size:13px;font-family:Arial;">Lenovo</b>', badge:'' },
      { label:'店面自检', bg:'linear-gradient(135deg,#74B9FF,#0984E3)', icon:'&#128203;', badge:'' },
      { label:'内容管理平台', bg:'linear-gradient(135deg,#FD79A8,#E84393)', icon:'&#128218;', badge:'' },
      { label:'以旧换新', bg:'linear-gradient(135deg,#FFEAA7,#FDCB6E)', icon:'&#128260;', badge:'' },
      { label:'企微助手', bg:'linear-gradient(135deg,#E17055,#D63031)', icon:'<b style="color:#fff;font-size:11px;font-family:Arial;">WeCom</b>', badge:'' },
      { label:'产品政策', bg:'linear-gradient(135deg,#FF7675,#D63031)', icon:'&#128200;', badge:'' },
    ]);

    const salesApps = ref([
      { label:'销售看板', bg:'linear-gradient(135deg,#74B9FF,#0984E3)', icon:'&#128202;' },
      { label:'鹰眼巡检', bg:'linear-gradient(135deg,#636E72,#2D3436)', icon:'&#129413;' },
      { label:'扫码入库', bg:'linear-gradient(135deg,#55EFC4,#00B894)', icon:'&#128225;' },
    ]);

    function onAppClick(item) {
      if (item.target) {
        window.location.href = item.target;
      } else {
        toast(item.label + ' - 仅演示入口');
      }
    }

    return { screenRef, toastMsg, toast, apps, salesApps, onAppClick };
  }
}).mount('#app');
</script>
</body>
</html>
